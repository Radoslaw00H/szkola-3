<!DOCTYPE html>
<html>
<head>
    <meta charset="pl">
    <title>7.6</title>
</head>
<body>
    <script>
        let liczba1 = parseFloat(prompt("Podaj pierwszą liczbę (z kropką):"))
        let liczba2 = parseFloat(prompt("Podaj drugą liczbę (z kropką):"))
        let wynik = Math.round(liczba1 * liczba2)
        document.write("1 liczba podana przez użytkownika to: " + liczba1 + " .<br>")
        document.write("2 liczba podana przez użytkownika to: " + liczba2 + " .<br>")
        document.write("Wynik po zaokrągleniu mnożenia tych liczb to " + wynik + " , gdyż:<br>")
        document.write(liczba1 + " * " + liczba2 + " = " + (liczba1 * liczba2))
    </script>
</body>
</html>
