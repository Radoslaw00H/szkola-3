<!DOCTYPE html>
<html>
<head>
    <meta charset="pl">
    <title>7.4</title>
</head>
<body>
    <script>
        let liczba = Math.floor(Math.random() * 100) + 1
        let pierwiastek = Math.sqrt(liczba)
        document.write("Wylosowano liczbę: " + liczba + " .<br>")
        document.write("Pierwiastek kwadratowy z tej liczby wynosi: " + pierwiastek + " .<br>")
        document.write("W przybliżeniu jest to " + Math.floor(pierwiastek) + " .")
    </script>
</body>
</html>
