<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Ściągawka HTML - Znaczniki, Atrybuty, Style</title>
</head>
<body>

<!-- =====================================================
        ZNACZNIKI HTML - WYMAGAJĄCE ZAMKNIĘCIA
===================================================== -->

<!-- <html> ... </html> - Główny kontener całego dokumentu HTML -->
<!-- <head> ... </head> - Sekcja nagłówkowa z meta, title, linki -->
<!-- <title> ... </title> - Tytuł strony -->
<!-- <body> ... </body> - Zawartość widoczna na stronie -->
<!-- <h1> ... </h1> do <h6> ... </h6> - Nagłówki od największego do najmniejszego -->
<!-- <p> ... </p> - Akapit tekstu -->
<!-- <a> ... </a> - Link do innej strony lub miejsca -->
<!-- <ul> ... </ul> - Lista punktowana -->
<!-- <ol> ... </ol> - Lista numerowana -->
<!-- <li> ... </li> - Element listy -->
<!-- <div> ... </div> - Ogólny kontener blokowy -->
<!-- <span> ... </span> - Kontener liniowy -->
<!-- <strong> ... </strong> - Tekst pogrubiony -->
<!-- <em> ... </em> - Tekst pochylony -->
<!-- <form> ... </form> - Formularz -->
<!-- <label> ... </label> - Etykieta pola formularza -->
<!-- <textarea> ... </textarea> - Pole tekstowe wielowierszowe -->
<!-- <button> ... </button> - Przycisk -->
<!-- <select> ... </select> - Lista rozwijana -->
<!-- <option> ... </option> - Pojedyncza opcja listy -->
<!-- <fieldset> ... </fieldset> - Grupowanie pól formularza -->
<!-- <legend> ... </legend> - Tytuł grupy w fieldset -->
<!-- <table> ... </table> - Tabela -->
<!-- <tr> ... </tr> - Wiersz tabeli -->
<!-- <th> ... </th> - Komórka nagłówkowa -->
<!-- <td> ... </td> - Komórka zwykła -->
<!-- <header> ... </header> - Nagłówek strony/sekcji -->
<!-- <footer> ... </footer> - Stopka strony/sekcji -->
<!-- <nav> ... </nav> - Nawigacja strony -->
<!-- <article> ... </article> - Samodzielna treść -->
<!-- <section> ... </section> - Sekcja tematyczna -->
<!-- <aside> ... </aside> - Treść poboczna -->
<!-- <figure> ... </figure> - Element dla obrazków/mediów -->
<!-- <figcaption> ... </figcaption> - Podpis do figure -->
<!-- <main> ... </main> - Główna treść -->
<!-- <script> ... </script> - Skrypty JS -->
<!-- <style> ... </style> - Wbudowane style -->

<!-- =====================================================
        ZNACZNIKI HTML - SAMODZIELNE (BEZ ZAMKNIĘCIA)
===================================================== -->

<!-- <br> - Nowa linia -->
<!-- <hr> - Pozioma linia -->
<!-- <img> - Obrazek -->
<!-- <input> - Pole formularza -->
<!-- <link> - Łącze zewnętrzne np. do CSS -->
<!-- <meta> - Meta dane strony -->
<!-- <source> - Źródło multimediów -->
<!-- <track> - Napisy wideo/audio -->
<!-- <area> - Obszar klikalny w mapie -->
<!-- <col> - Kolumna tabeli -->
<!-- <base> - Podstawowy adres URL dla linków -->

<!-- =====================================================
        ATRIBUTY HTML - DLA ZNAZNIKÓW ZAMYKAJĄCYCH
===================================================== -->

<!-- href="URL" - link docelowy (dla <a>) -->
<!-- target="_blank/_self" - otwarcie w nowej karcie / tej samej (dla <a>) -->
<!-- title="opis" - podpowiedź przy najechaniu -->
<!-- src="ścieżka" - źródło pliku (dla <img>, <script>, <source>) -->
<!-- alt="opis" - tekst alternatywny (dla <img>) -->
<!-- width / height - wymiary obrazka lub elementu -->
<!-- action="URL" - dokąd wysyłane dane (dla <form>) -->
<!-- method="GET/POST" - metoda przesyłania danych -->
<!-- enctype="typ" - kodowanie danych formularza -->
<!-- type="text/password/email/number/etc." - rodzaj pola/formularza/przycisku -->
<!-- name="nazwa" - identyfikator wartości w formularzu -->
<!-- value="wartość domyślna" - domyślna wartość pola -->
<!-- placeholder="tekst" - podpowiedź w polu formularza -->
<!-- required - pole obowiązkowe -->
<!-- checked - zaznaczone domyślnie (checkbox/radio) -->
<!-- disabled - pole nieaktywne -->
<!-- selected - opcja domyślnie wybrana (dla <option>) -->
<!-- rowspan / colspan - łączenie komórek w tabeli -->
<!-- id="unikalny" - identyfikator elementu -->
<!-- class="nazwa" - nazwa klasy (dla stylów lub JS) -->

<!-- =====================================================
        ATRIBUTY HTML - DLA ZNAZNIKÓW SAMODZIELNYCH
===================================================== -->

<!-- charset="UTF-8" - kodowanie znaków (dla <meta>) -->
<!-- name="description/keywords/author" - meta dane -->
<!-- content="tekst" - wartość atrybutu dla meta -->
<!-- rel="stylesheet" - powiązanie z CSS (dla <link>) -->
<!-- async / defer - sposób ładowania JS (dla <script>) -->
<!-- shape="rect/circle/polygon" - kształt obszaru (dla <area>) -->
<!-- coords="x1,y1,x2,y2..." - współrzędne obszaru (dla <area>) -->
<!-- kind="subtitles/captions" - rodzaj tracka -->
<!-- srclang="język" - język tracka -->
<!-- label="tekst" - nazwa widoczna dla użytkownika -->

<!-- =====================================================
        STYLE INLINE / GLOBALNE
===================================================== -->

<!-- style="property:value;" - pozwala dodawać style bez CSS -->
<!-- color - kolor tekstu -->
<!-- background-color - kolor tła -->
<!-- font-size - rozmiar czcionki -->
<!-- font-weight - pogrubienie czcionki -->
<!-- font-style - kursywa -->
<!-- text-align - wyrównanie tekstu -->
<!-- width / height - wymiary elementu -->
<!-- display - sposób wyświetlania (block, inline, none) -->
<!-- margin / padding - marginesy i odstępy wewnętrzne -->
<!-- border - obramowanie -->
<!-- visibility: hidden/visible - ukrycie lub pokazanie elementu -->
<!-- float - pozycjonowanie elementu w lewo/prawo -->
<!-- position - typ pozycjonowania (static, relative, absolute, fixed) -->
<!-- z-index - kolejność warstw -->

</body>
</html>
